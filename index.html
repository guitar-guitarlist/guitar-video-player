<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Guitar Video Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #191c20;
      --panel-2: #20242a;
      --text: #f3f0e8;
      --muted: #b9b1a3;
      --line: #343a42;
      --accent: #4fd1a5;
      --accent-2: #f0b35a;
      --danger: #ff7b7b;
      --shadow: 0 16px 50px rgba(0, 0, 0, .35);
      --radius: 8px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    button, input { font: inherit; }

    button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active { transform: translateY(1px); }

    button.primary {
      border-color: transparent;
      background: var(--accent);
      color: #06251c;
      font-weight: 800;
    }

    button.warning {
      border-color: rgba(240, 179, 90, .45);
      color: var(--accent-2);
    }

    button.danger {
      border-color: rgba(255, 123, 123, .45);
      color: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .5;
      transform: none;
    }

    /* ── App shell ── */
    .app {
      width: min(1280px, 100%);
      height: 100dvh;
      display: flex;
      gap: 10px;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    /* ── Portrait: video fixed on top, controls scroll below ── */
    @media (orientation: portrait) {
      .app {
        flex-direction: column;
      }

      .stage {
        flex: 0 0 clamp(180px, 35dvh, 280px);
      }

      .controls {
        flex: 1 1 0;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding-bottom: calc(16px + env(safe-area-inset-bottom));
      }

      .timeline {
        grid-template-columns: 1fr auto;
        gap: 6px;
      }

      .timeline input[type="range"] {
        grid-column: 1 / -1;
        grid-row: 1;
      }

      .jump-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .loop-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .adjust-grid { grid-template-columns: 1fr; }

      button { min-height: 42px; }
    }

    /* ── Landscape: video fixed on left, controls scroll on right ── */
    @media (orientation: landscape) {
      .app {
        flex-direction: row;
      }

      .stage {
        flex: 1 1 0;
        min-width: 0;
      }

      .controls {
        flex: 0 0 clamp(280px, 38vw, 420px);
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .jump-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .loop-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .adjust-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      button { min-height: 38px; }
      .main-buttons button { min-height: 44px; }
    }

    /* ── Stage ── */
    .stage {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #050607;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
    }

    .stage.dragover {
      border-color: var(--accent);
      outline: 3px solid rgba(79, 209, 165, .22);
    }

    video {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
      background: #050607;
    }

    .youtube-player, #youtubePlayer {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }

    .stage.youtube-mode video { display: none; }
    .stage.youtube-mode #youtubePlayer { display: block; }

    .stage.instagram-mode video,
    .stage.instagram-mode #youtubePlayer { display: none; }
    .stage.instagram-mode #instagramPlayer { display: block; }

    #instagramPlayer iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── Empty state ── */
    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
    }

    .empty[hidden], .stage.has-media .empty { display: none !important; }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 20px;
    }

    /* ── Controls panel ── */
    .controls {
      display: grid;
      gap: 10px;
      align-content: start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 12px;
    }

    .file-actions {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .file-label {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: var(--radius);
      background: var(--accent);
      color: #06251c;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    .file-actions button, .file-label { min-height: 36px; }

    .file-label input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .filename {
      grid-column: 1 / -1;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 13px;
    }

    .youtube-input {
      min-width: 0;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #111418;
      color: var(--text);
    }

    .youtube-input::placeholder { color: #817b72; }

    .timeline {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .main-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .jump-grid, .loop-grid, .adjust-grid {
      display: grid;
      gap: 8px;
    }

    /* Default (wide desktop) */
    .jump-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .loop-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .adjust-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .control-box {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #15181c;
    }

    .control-title {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
    }

    .value {
      min-width: 64px;
      text-align: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .build-time {
      text-align: right;
      font-size: 10px;
      color: var(--line);
      padding-top: 2px;
    }

    /* Volume box: title row full-width, then slider + value */
    .volume-box {
      grid-template-columns: 1fr auto;
    }

    .volume-box .control-title {
      grid-column: 1 / -1;
    }

    .loop-grid button { font-size: 13px; }

    /* Instagram manual fallback */
    .ig-manual { gap: 6px; }
    .control-hint { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.5; }
    .control-hint a { color: var(--accent); }
    .ig-manual-row { display: flex; gap: 6px; }
    .ig-manual-row input { flex: 1; min-width: 0; }


    /* A-B loop: ON state — prominent green like primary button */
    .loop-on {
      background: var(--accent) !important;
      color: #06251c !important;
      border-color: transparent !important;
      font-weight: 800;
    }

    /* A/B point set indicator */
    .loop-point-set {
      border-color: rgba(79, 209, 165, .55);
      color: var(--accent);
    }

    /* Recording */
    .rec-active {
      background: var(--danger) !important;
      border-color: transparent !important;
      color: #fff !important;
      font-weight: 800;
    }

    /* Zoom/pan */
    #mediaWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      will-change: transform;
    }

    .stage.zoomed { cursor: grab; }
    .stage.dragging { cursor: grabbing; }

    /* 縦長動画: portrait orientation でステージを大きく */
    @media (orientation: portrait) {
      .stage.portrait-video {
        flex: 0 0 clamp(240px, 55dvh, 480px);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="stage" class="stage" aria-label="動画プレイヤー">
      <div id="mediaWrap">
        <video id="video" playsinline preload="metadata"></video>
        <div id="youtubePlayer" class="youtube-player"></div>
        <div id="instagramPlayer" class="youtube-player"></div>
      </div>
      <div id="empty" class="empty">
        <div>
          <strong>動画を選択してください</strong>
          PCではここにドラッグ&amp;ドロップできます
        </div>
      </div>
    </section>


    <section class="controls" aria-label="練習コントロール">
      <div class="file-actions">
        <label class="file-label">
          動画を開く
          <input id="fileInput" type="file" accept=".mp4,.m4v,.mov,.webm,.mp3,.wav,.m4a,video/mp4,video/*,audio/*">
        </label>
        <input id="youtubeUrl" class="youtube-input" type="url" inputmode="url" placeholder="YouTube / Instagramリンク">
        <button id="loadYoutubeBtn" type="button">読込</button>
        <div id="filename" class="filename">ファイル未選択</div>
        <button id="igDirectBtn" type="button" style="display:none">▶ 全機能で再生（動画を取得）</button>
        <div id="igManualSection" class="ig-manual" style="display:none">
          <p class="control-hint">自動取得に失敗した場合は、<a href="https://cobalt.tools" target="_blank" rel="noopener">cobalt.tools</a> でInstagramのURLを入力し、表示されたリンクをコピーして貼り付けてください。</p>
          <div class="ig-manual-row">
            <input id="igManualUrl" type="url" placeholder="動画の直接URLを貼り付け">
            <button id="igManualLoad" type="button">再生</button>
          </div>
        </div>
      </div>

      <div class="timeline">
        <span id="currentTime">0:00</span>
        <input id="seek" type="range" min="0" max="1000" value="0" step="1" aria-label="再生位置">
        <span id="duration">0:00</span>
      </div>

      <div class="main-buttons">
        <button id="playBtn" class="primary" type="button">再生</button>
        <button id="muteBtn" type="button">ミュート</button>
      </div>

      <button id="recBtn" type="button">● 録画開始</button>

      <div class="control-box volume-box">
        <div class="control-title">音量</div>
        <input id="volume" type="range" min="0" max="200" step="1" value="100" aria-label="音量">
        <div id="volumeValue" class="value">100%</div>
      </div>

      <div class="jump-grid" aria-label="戻る・進む">
        <button type="button" data-jump="-1">-1秒</button>
        <button type="button" data-jump="-3">-3秒</button>
        <button type="button" data-jump="-5">-5秒</button>
        <button type="button" data-jump="-10">-10秒</button>
        <button type="button" data-jump="1">+1秒</button>
        <button type="button" data-jump="3">+3秒</button>
        <button type="button" data-jump="5">+5秒</button>
        <button type="button" data-jump="10">+10秒</button>
      </div>

      <div class="adjust-grid">
        <div class="control-box">
          <div class="control-title">再生スピード</div>
          <button id="speedDown" type="button">-</button>
          <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1" aria-label="再生スピード">
          <button id="speedUp" type="button">+</button>
          <div></div>
          <div id="speedValue" class="value">1.00x</div>
          <button id="speedReset" type="button">等速</button>
        </div>

        <div class="control-box">
          <div class="control-title">ピッチ</div>
          <button id="pitchDown" type="button">-</button>
          <input id="pitch" type="range" min="-12" max="12" step="1" value="0" aria-label="ピッチ">
          <button id="pitchUp" type="button">+</button>
          <div></div>
          <div id="pitchValue" class="value">0 半音</div>
          <button id="pitchReset" type="button">原音</button>
        </div>
      </div>

      <div class="loop-grid" aria-label="A-Bループ">
        <button id="setA" type="button">Aを設定</button>
        <button id="setB" type="button">Bを設定</button>
        <button id="loopToggle" type="button">ループ: OFF</button>
        <button id="clearLoop" class="danger" type="button">解除</button>
      </div>



      <div id="status" class="status">ピッチ変更は再生開始後に有効になります。</div>
      <div class="build-time">更新: 2026-05-05 11:00 JST</div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const els = {
      fileInput: $("fileInput"),
      youtubeUrl: $("youtubeUrl"),
      loadYoutubeBtn: $("loadYoutubeBtn"),
      filename: $("filename"),
      stage: $("stage"),
      video: $("video"),
      youtubePlayer: $("youtubePlayer"),
      instagramPlayer: $("instagramPlayer"),
      empty: $("empty"),
      playBtn: $("playBtn"),
      muteBtn: $("muteBtn"),
      seek: $("seek"),
      currentTime: $("currentTime"),
      duration: $("duration"),
      speed: $("speed"),
      speedValue: $("speedValue"),
      speedDown: $("speedDown"),
      speedUp: $("speedUp"),
      speedReset: $("speedReset"),
      pitch: $("pitch"),
      pitchValue: $("pitchValue"),
      pitchDown: $("pitchDown"),
      pitchUp: $("pitchUp"),
      pitchReset: $("pitchReset"),
      setA: $("setA"),
      setB: $("setB"),
      loopToggle: $("loopToggle"),
      clearLoop: $("clearLoop"),
      volume: $("volume"),
      volumeValue: $("volumeValue"),
      recBtn: $("recBtn"),
      igDirectBtn: $("igDirectBtn"),
      igManualSection: $("igManualSection"),
      igManualUrl: $("igManualUrl"),
      igManualLoad: $("igManualLoad"),
      status: $("status")
    };

    const state = {
      mode: "local",
      objectUrl: "",
      seeking: false,
      loopA: null,
      loopB: null,
      loopEnabled: false,
      youtubeApiReady: false,
      youtubePlayer: null,
      youtubePlayerReady: false,
      youtubeState: -1,
      instagramShortcode: "",
      instagramOrigUrl: "",
      recActive: false,
      recorder: null,
      recChunks: [],
      recAudioDest: null,
      audioReady: false,
      audioCtx: null,
      source: null,
      pitchNode: null,
      silentGain: null,
      directGain: null,
      pitchGain: null,
      masterGain: null
    };

    function workletUrl() {
      const source = `
        class PitchShifter extends AudioWorkletProcessor {
          static get parameterDescriptors() {
            return [{ name: "ratio", defaultValue: 1, minValue: 0.5, maxValue: 2 }];
          }

          constructor() {
            super();
            this.maxDelay = 0.12;
            this.window = 0.08;
            this.phase = 0;
          }

          triangle(x) {
            return x < 0.5 ? x * 2 : (1 - x) * 2;
          }

          process(inputs, outputs, parameters) {
            const input = inputs[0];
            const output = outputs[0];
            if (!input || !input[0]) return true;

            const ratioParam = parameters.ratio;
            const ratio = ratioParam.length ? ratioParam[0] : ratioParam;
            const sampleRateLocal = sampleRate;
            const windowSamples = Math.max(128, Math.floor(this.window * sampleRateLocal));
            const baseDelay = Math.floor(this.maxDelay * sampleRateLocal);
            const phaseStep = Math.abs(ratio - 1) / windowSamples;
            const sign = ratio >= 1 ? 1 : -1;

            if (!this.buffers || this.buffers.length !== input.length) {
              this.size = 1;
              while (this.size < baseDelay + windowSamples + 256) this.size *= 2;
              this.mask = this.size - 1;
              this.writeIndex = 0;
              this.buffers = Array.from({ length: input.length }, () => new Float32Array(this.size));
            }

            for (let i = 0; i < output[0].length; i++) {
              this.phase += phaseStep;
              if (this.phase >= 1) this.phase -= 1;
              const p1 = this.phase;
              const p2 = (this.phase + 0.5) % 1;
              const d1 = baseDelay + sign * p1 * windowSamples;
              const d2 = baseDelay + sign * p2 * windowSamples;
              const g1 = this.triangle(p1);
              const g2 = this.triangle(p2);

              for (let ch = 0; ch < output.length; ch++) {
                const source = input[ch] || input[0];
                const buffer = this.buffers[ch] || this.buffers[0];
                buffer[this.writeIndex] = source[i] || 0;
                const read1 = this.readDelay(buffer, d1);
                const read2 = this.readDelay(buffer, d2);
                output[ch][i] = (read1 * g1 + read2 * g2) * 0.92;
              }

              this.writeIndex = (this.writeIndex + 1) & this.mask;
            }

            return true;
          }

          readDelay(buffer, delay) {
            const index = this.writeIndex - delay;
            const i0 = Math.floor(index);
            const frac = index - i0;
            const a = buffer[i0 & this.mask];
            const b = buffer[(i0 - 1) & this.mask];
            return a + (b - a) * frac;
          }
        }

        registerProcessor("pitch-shifter", PitchShifter);
      `;
      return URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds)) return "0:00";
      const safe = Math.max(0, seconds);
      const h = Math.floor(safe / 3600);
      const m = Math.floor((safe % 3600) / 60);
      const s = Math.floor(safe % 60).toString().padStart(2, "0");
      return h ? `${h}:${m.toString().padStart(2, "0")}:${s}` : `${m}:${s}`;
    }

    function formatTimeFull(seconds) {
      if (!Number.isFinite(seconds)) return "0:00.00";
      const safe = Math.max(0, seconds);
      const h  = Math.floor(safe / 3600);
      const m  = Math.floor((safe % 3600) / 60);
      const s  = Math.floor(safe % 60).toString().padStart(2, "0");
      const cs = Math.floor((safe % 1) * 100).toString().padStart(2, "0");
      return h ? `${h}:${m.toString().padStart(2, "0")}:${s}.${cs}` : `${m}:${s}.${cs}`;
    }

    function currentDuration() {
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        return state.youtubePlayer.getDuration() || 0;
      }
      return els.video.duration || 0;
    }

    function currentTime() {
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        return state.youtubePlayer.getCurrentTime() || 0;
      }
      return els.video.currentTime || 0;
    }

    function seekTo(time, allowSeekAhead = true) {
      const target = clampTime(time);
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        state.youtubePlayer.seekTo(target, allowSeekAhead);
      } else if (els.video.src) {
        els.video.currentTime = target;
      }
    }

    function clampTime(time) {
      const duration = currentDuration();
      return Math.min(Math.max(0, time), duration || Number.MAX_SAFE_INTEGER);
    }

    function setStatus(text) {
      els.status.textContent = text;
    }

    function updatePlayButton() {
      if (state.mode === "youtube") {
        els.playBtn.textContent = state.youtubeState === 1 ? "一時停止" : "再生";
        return;
      }
      els.playBtn.textContent = els.video.paused ? "再生" : "一時停止";
    }

    function updateTimeline() {
      const duration = currentDuration();
      const time = currentTime();
      if (!state.seeking && Number.isFinite(duration) && duration > 0) {
        els.seek.value = String((time / duration) * 1000);
      }
      els.currentTime.textContent = formatTime(time);
      els.duration.textContent = formatTime(duration);
    }

    function updateLoopUi() {
      const aSet = state.loopA != null;
      const bSet = state.loopB != null;
      els.setA.textContent = aSet ? `A ${formatTimeFull(state.loopA)}` : "Aを設定";
      els.setB.textContent = bSet ? `B ${formatTimeFull(state.loopB)}` : "Bを設定";
      els.setA.classList.toggle("loop-point-set", aSet);
      els.setB.classList.toggle("loop-point-set", bSet);
      els.loopToggle.textContent = state.loopEnabled ? "ループ: ON" : "ループ: OFF";
      els.loopToggle.classList.toggle("loop-on", state.loopEnabled);
      els.loopToggle.disabled = !(aSet && bSet && state.loopB > state.loopA);
    }

    function pitchRatio() {
      // Negate semitones so that positive slider value = higher pitch
      return Math.pow(2, -Number(els.pitch.value) / 12);
    }

    async function updateVolume() {
      const vol = Number(els.volume.value);
      els.volumeValue.textContent = `${vol}%`;

      if (state.mode === "youtube" && state.youtubePlayerReady) {
        // YouTube API tops out at 100
        state.youtubePlayer.setVolume(Math.min(100, vol));
        if (vol === 0) {
          state.youtubePlayer.mute();
          els.muteBtn.textContent = "ミュート解除";
        } else if (state.youtubePlayer.isMuted()) {
          state.youtubePlayer.unMute();
          els.muteBtn.textContent = "ミュート";
        }
        return;
      }

      // Local video: use masterGain for amplification above 100%
      if (vol > 100 && !state.audioReady) {
        await setupAudio();
        if (state.audioCtx?.state === "suspended") await state.audioCtx.resume();
      }

      if (state.audioReady && state.masterGain) {
        els.video.volume = 1;
        state.masterGain.gain.setTargetAtTime(vol / 100, state.audioCtx.currentTime, 0.01);
      } else {
        els.video.volume = Math.min(1, vol / 100);
      }

      if (vol === 0) {
        els.video.muted = true;
        els.muteBtn.textContent = "ミュート解除";
      } else if (els.video.muted) {
        els.video.muted = false;
        els.muteBtn.textContent = "ミュート";
      }
    }

    function updateSpeed() {
      const speed = Number(els.speed.value);
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        state.youtubePlayer.setPlaybackRate(speed);
      } else {
        els.video.playbackRate = speed;
      }
      els.speedValue.textContent = `${speed.toFixed(2)}x`;
    }

    function updatePitch() {
      const semitones = Number(els.pitch.value);
      els.pitchValue.textContent = `${semitones > 0 ? "+" : ""}${semitones} 半音`;
      if (state.mode === "youtube") {
        const shifted = semitones !== 0;
        setStatus(shifted ? "YouTube動画ではピッチ変更は使えません。ローカル動画で使えます。" : "YouTube動画を読み込みました。速度変更、移動、A-Bループが使えます。");
        return;
      }
      if (state.pitchNode) {
        state.pitchNode.parameters.get("ratio").setTargetAtTime(pitchRatio(), state.audioCtx.currentTime, 0.01);
      }
      const shifted = semitones !== 0;
      if (state.directGain && state.pitchGain) {
        state.directGain.gain.setTargetAtTime(shifted ? 0 : 1, state.audioCtx.currentTime, 0.01);
        state.pitchGain.gain.setTargetAtTime(shifted ? 1 : 0, state.audioCtx.currentTime, 0.01);
      }
      if (shifted && !state.audioReady) setStatus("再生ボタンを押すとピッチ変更が有効になります。");
    }

    async function setupAudio() {
      if (state.audioReady) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext || !window.AudioWorkletNode) {
        setStatus("このブラウザではピッチ変更に対応していません。");
        els.pitch.disabled = true;
        return;
      }

      try {
        state.audioCtx = new AudioContext();
        await state.audioCtx.audioWorklet.addModule(workletUrl());
        state.source = state.audioCtx.createMediaElementSource(els.video);
        state.silentGain = state.audioCtx.createGain();
        state.directGain = state.audioCtx.createGain();
        state.pitchGain = state.audioCtx.createGain();
        state.pitchNode = new AudioWorkletNode(state.audioCtx, "pitch-shifter", {
          numberOfInputs: 1,
          numberOfOutputs: 1,
          outputChannelCount: [2]
        });

        state.masterGain = state.audioCtx.createGain();
        state.masterGain.gain.value = Math.max(0, Number(els.volume.value)) / 100;

        state.silentGain.gain.value = 0;
        state.directGain.gain.value = Number(els.pitch.value) === 0 ? 1 : 0;
        state.pitchGain.gain.value = Number(els.pitch.value) === 0 ? 0 : 1;
        state.pitchNode.parameters.get("ratio").value = pitchRatio();

        state.source.connect(state.silentGain).connect(state.audioCtx.destination);
        state.source.connect(state.directGain).connect(state.masterGain).connect(state.audioCtx.destination);
        state.source.connect(state.pitchNode).connect(state.pitchGain).connect(state.masterGain);
        state.audioReady = true;
        setStatus("準備OK。ピッチ変更は半音単位で使えます。");
      } catch (error) {
        console.error(error);
        setStatus("ピッチ変更の初期化に失敗しました。通常再生は使えます。");
      }
    }

    function setMode(mode) {
      state.mode = mode;
      els.stage.classList.toggle("youtube-mode",   mode === "youtube");
      els.stage.classList.toggle("instagram-mode", mode === "instagram");

      const noAudio    = mode === "youtube" || mode === "instagram";
      const instagram  = mode === "instagram";

      [els.pitch, els.pitchDown, els.pitchUp, els.pitchReset].forEach(el => {
        el.disabled = noAudio;
      });

      // Instagram: no JS API — disable all playback controls
      [els.playBtn, els.muteBtn, els.seek, els.speed, els.speedDown, els.speedUp,
       els.speedReset, els.setA, els.setB, els.loopToggle, els.clearLoop, els.volume].forEach(el => {
        el.disabled = instagram;
      });

      els.igDirectBtn.style.display = instagram ? "" : "none";

      updatePlayButton();
      updateTimeline();
    }

    async function togglePlay() {
      if (state.mode === "instagram") return;
      if (state.mode === "youtube") {
        if (!state.youtubePlayerReady) return;
        if (state.youtubeState === 1) {
          state.youtubePlayer.pauseVideo();
        } else {
          state.youtubePlayer.playVideo();
        }
        return;
      }
      if (!els.video.src) return;
      await setupAudio();
      if (state.audioCtx && state.audioCtx.state === "suspended") {
        await state.audioCtx.resume();
      }
      if (els.video.paused) {
        await els.video.play();
      } else {
        els.video.pause();
      }
    }

    function extractInstagramId(value) {
      const text = value.trim();
      try {
        const url = new URL(text);
        if (!url.hostname.includes("instagram.com") && !url.hostname.includes("instagr.am")) return "";
        const m = url.pathname.match(/\/(p|reel|reels|tv)\/([A-Za-z0-9_-]+)/);
        return m ? m[2] : "";
      } catch (_) { return ""; }
    }

    function isInstagramUrl(value) {
      return value.includes("instagram.com") || value.includes("instagr.am");
    }

    async function loadInstagram() {
      const shortcode = extractInstagramId(els.youtubeUrl.value);
      if (!shortcode) {
        setStatus("InstagramのURLを確認してください（投稿・リール対応）。");
        return;
      }
      if (state.youtubePlayerReady) state.youtubePlayer.pauseVideo();
      els.video.pause();
      els.video.removeAttribute("src");
      els.video.load();
      els.empty.hidden = true;
      els.stage.classList.add("has-media");
      els.filename.textContent = `Instagram: ${shortcode}`;
      state.loopA = null; state.loopB = null; state.loopEnabled = false;
      updateLoopUi();
      setMode("instagram");

      // Build embed iframe (logged-in users see full player; others see preview)
      state.instagramShortcode = shortcode;
      state.instagramOrigUrl = els.youtubeUrl.value.trim().split("?")[0].replace(/\/$/, "") + "/";
      els.instagramPlayer.innerHTML =
        `<iframe src="https://www.instagram.com/p/${shortcode}/embed/" allowtransparency="true" scrolling="no" allowfullscreen></iframe>`;

      setStatus("読み込みました。▶ボタンで動画を取得すると速度・ピッチ・ループも使えます。");
    }

    function extractYoutubeId(value) {
      const text = value.trim();
      if (!text) return "";
      const bare = text.match(/^[a-zA-Z0-9_-]{11}$/);
      if (bare) return text;
      try {
        const url = new URL(text);
        if (url.hostname.includes("youtu.be")) return url.pathname.slice(1).split("/")[0];
        if (url.searchParams.get("v")) return url.searchParams.get("v");
        const embed = url.pathname.match(/\/(?:embed|shorts|live)\/([a-zA-Z0-9_-]{11})/);
        if (embed) return embed[1];
      } catch (_) {
        return "";
      }
      return "";
    }

    function loadYoutubeApi() {
      if (state.youtubeApiReady || window.YT?.Player) return Promise.resolve();
      return new Promise((resolve, reject) => {
        window.onYouTubeIframeAPIReady = () => {
          state.youtubeApiReady = true;
          resolve();
        };
        const script = document.createElement("script");
        script.src = "https://www.youtube.com/iframe_api";
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function loadYoutube() {
      const videoId = extractYoutubeId(els.youtubeUrl.value);
      if (!videoId) {
        setStatus("YouTubeリンクを確認してください。");
        return;
      }

      if (!navigator.onLine && location.protocol === "file:") {
        setStatus("YouTube動画の読み込みにはインターネット接続が必要です。");
      }

      await loadYoutubeApi();
      setMode("youtube");
      els.video.pause();
      els.video.removeAttribute("src");
      els.video.load();
      els.empty.hidden = true;
      els.stage.classList.add("has-media");
      els.filename.textContent = `YouTube: ${videoId}`;
      state.loopA = null;
      state.loopB = null;
      state.loopEnabled = false;
      state.youtubePlayerReady = false;
      state.youtubeState = -1;
      updateLoopUi();

      const options = {
        videoId,
        playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
        events: {
          onReady: () => {
            state.youtubePlayerReady = true;
            updateSpeed();
            updateVolume();
            updateTimeline();
            setStatus("YouTube動画を読み込みました。ピッチ変更はローカル動画のみ対応です。");
          },
          onStateChange: (event) => {
            state.youtubeState = event.data;
            updatePlayButton();
          },
          onError: (event) => {
            const message = event.data === 153
              ? "YouTubeエラー153: HTMLを直接開く file:// では再生できません。ローカルサーバーで開いてください。"
              : "YouTube動画を読み込めませんでした。URLや公開設定を確認してください。";
            setStatus(message);
          }
        }
      };

      if (state.youtubePlayer) {
        state.youtubePlayerReady = true;
        state.youtubePlayer.loadVideoById(videoId);
        updateSpeed();
        setStatus("YouTube動画を読み込みました。ピッチ変更はローカル動画のみ対応です。");
      } else {
        state.youtubePlayer = new YT.Player("youtubePlayer", options);
      }
    }

    // ── Instagram direct fetch ───────────────────────────────────
    // 自前のCloudflare Worker経由でcobaltにアクセス
    const MY_WORKER = "https://ig-proxy.casiopeakazumi.workers.dev/";

    async function fetchViaCobalt(igUrl) {
      const res = await fetch(MY_WORKER, {
        method: "POST",
        headers: { "Accept": "application/json", "Content-Type": "application/json" },
        body: JSON.stringify({ url: igUrl }),
        signal: AbortSignal.timeout(30000),
      });
      if (!res.ok) throw new Error(`Worker HTTP ${res.status}`);
      const data = await res.json();
      if (data.url) return data.url;
      throw new Error(data.error || "動画URLを取得できませんでした");
    }

    // Load a direct video URL (used by both auto-fetch and manual input)
    function applyInstagramVideoUrl(videoUrl, shortcode) {
      els.stage.classList.remove("instagram-mode");
      els.stage.classList.add("has-media");
      els.instagramPlayer.innerHTML = "";
      state.mode = "local";
      els.igDirectBtn.style.display = "none";
      els.igManualSection.style.display = "none";

      [els.playBtn, els.muteBtn, els.seek, els.speed, els.speedDown, els.speedUp,
       els.speedReset, els.pitch, els.pitchDown, els.pitchUp, els.pitchReset,
       els.setA, els.setB, els.loopToggle, els.clearLoop, els.volume].forEach(el => {
        el.disabled = false;
      });

      state.loopA = null; state.loopB = null; state.loopEnabled = false;
      updateLoopUi();

      els.video.crossOrigin = "anonymous";
      els.video.src = videoUrl;
      els.video.load();
      els.filename.textContent = `Instagram: ${shortcode}`;

      els.video.onerror = () => {
        els.video.onerror = null;
        els.video.removeAttribute("crossOrigin");
        els.video.src = videoUrl;
        els.video.load();
        setStatus("動画を読み込みました（ピッチ変更は使用不可）。");
      };

      setStatus("動画を取得しました。速度・ピッチ・ループ・録画が使えます。");
      updatePlayButton();
      updateTimeline();
    }

    async function loadInstagramDirect() {
      const shortcode = state.instagramShortcode;
      if (!shortcode) return;
      els.igDirectBtn.disabled = true;
      els.igManualSection.style.display = "none";
      setStatus("Instagram動画を取得中...");
      try {
        const igUrl = state.instagramOrigUrl || `https://www.instagram.com/p/${shortcode}/`;
        const videoUrl = await fetchViaCobalt(igUrl);
        applyInstagramVideoUrl(videoUrl, shortcode);
      } catch (_) {
        els.igManualSection.style.display = "";
        setStatus("自動取得に失敗しました。下の手順で手動取得してください。");
      } finally {
        els.igDirectBtn.disabled = false;
      }
    }

    els.igDirectBtn.addEventListener("click", () => {
      loadInstagramDirect().catch(() => {
        els.igManualSection.style.display = "";
        setStatus("自動取得に失敗しました。手動でURLを入力してください。");
      });
    });

    els.igManualLoad.addEventListener("click", () => {
      const url = els.igManualUrl.value.trim();
      if (!url.startsWith("http")) { setStatus("有効なURLを入力してください。"); return; }
      applyInstagramVideoUrl(url, state.instagramShortcode || "manual");
    });

    // ── Recording ───────────────────────────────────────────────
    let recCanvas = null, recAnimId = null;

    function recMimeType() {
      const types = ["video/mp4;codecs=avc1,mp4a.40.2", "video/mp4",
                     "video/webm;codecs=vp9,opus", "video/webm;codecs=vp8,opus", "video/webm"];
      return types.find(t => MediaRecorder.isTypeSupported(t)) || "";
    }

    function drawRecFrame() {
      const v = els.video;
      const ctx = recCanvas.getContext("2d");
      const cw = recCanvas.width, ch = recCanvas.height;
      ctx.fillStyle = "#050607";
      ctx.fillRect(0, 0, cw, ch);
      if (v.readyState >= 2 && v.videoWidth && v.videoHeight) {
        const r = Math.min(cw / v.videoWidth, ch / v.videoHeight);
        const dw = v.videoWidth * r, dh = v.videoHeight * r;
        const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
        ctx.save();
        ctx.translate(cw / 2 + zoomState.panX, ch / 2 + zoomState.panY);
        ctx.scale(zoomState.scale, zoomState.scale);
        ctx.drawImage(v, dx - cw / 2, dy - ch / 2, dw, dh);
        ctx.restore();
      }
      recAnimId = requestAnimationFrame(drawRecFrame);
    }

    async function startRecording() {
      if (state.mode !== "local" || !els.video.src) {
        setStatus("ローカル動画を読み込んでから録画してください。");
        return;
      }
      await setupAudio();
      if (state.audioCtx && state.audioCtx.state === "suspended") {
        await state.audioCtx.resume();
      }
      const rect = els.stage.getBoundingClientRect();
      recCanvas = document.createElement("canvas");
      recCanvas.width  = Math.round(rect.width)  || 1280;
      recCanvas.height = Math.round(rect.height) || 720;

      const canvasStream = recCanvas.captureStream(30);
      let mediaStream = canvasStream;

      if (state.audioReady && state.masterGain) {
        const dest = state.audioCtx.createMediaStreamDestination();
        state.masterGain.connect(dest);
        state.recAudioDest = dest;
        mediaStream = new MediaStream([...canvasStream.getTracks(), ...dest.stream.getTracks()]);
      }

      const mime = recMimeType();
      state.recorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : {});
      state.recChunks = [];
      state.recorder.ondataavailable = (e) => { if (e.data.size > 0) state.recChunks.push(e.data); };
      state.recorder.onstop = finishRecording;
      state.recorder.start(200);
      state.recActive = true;
      drawRecFrame();
      els.recBtn.textContent = "■ 録画停止";
      els.recBtn.classList.add("rec-active");
      setStatus("録画中... もう一度押すと停止します。");
    }

    function stopRecording() {
      if (!state.recActive) return;
      state.recActive = false;
      cancelAnimationFrame(recAnimId);
      recAnimId = null;
      state.recorder.stop();
      if (state.recAudioDest) {
        try { state.masterGain.disconnect(state.recAudioDest); } catch (_) {}
        state.recAudioDest = null;
      }
      els.recBtn.textContent = "● 録画開始";
      els.recBtn.classList.remove("rec-active");
      setStatus("録画停止。ダウンロードを準備中...");
    }

    function finishRecording() {
      const mime = state.recorder?.mimeType || "video/webm";
      const ext  = mime.includes("mp4") ? "mp4" : "webm";
      const blob = new Blob(state.recChunks, { type: mime });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = `guitar-rec.${ext}`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 30000);
      setStatus(`録画完了。${ext.toUpperCase()}でダウンロードしました。`);
    }

    els.recBtn.addEventListener("click", () => {
      if (state.recActive) { stopRecording(); } else {
        startRecording().catch(() => setStatus("録画を開始できませんでした。"));
      }
    });

    function loadFile(file) {
      if (!file) return;
      if (state.recActive) stopRecording();
      setMode("local");
      if (state.youtubePlayerReady) state.youtubePlayer.pauseVideo();
      if (state.objectUrl) URL.revokeObjectURL(state.objectUrl);
      state.objectUrl = URL.createObjectURL(file);
      els.video.src = state.objectUrl;
      els.video.load();
      els.filename.textContent = file.name;
      els.empty.hidden = true;
      els.stage.classList.add("has-media");
      state.loopA = null;
      state.loopB = null;
      state.loopEnabled = false;
      updateLoopUi();
      setStatus("動画を読み込みました。");
    }

    function jump(seconds) {
      if (state.mode === "instagram") return;
      if (state.mode === "local" && !els.video.src) return;
      if (state.mode === "youtube" && !state.youtubePlayerReady) return;
      seekTo(currentTime() + seconds);
      updateTimeline();
    }

    function nudgeRange(input, amount) {
      const value = Number(input.value) + amount;
      const min = Number(input.min);
      const max = Number(input.max);
      input.value = String(Math.min(max, Math.max(min, value)));
      input.dispatchEvent(new Event("input"));
    }

    els.fileInput.addEventListener("change", (event) => loadFile(event.target.files[0]));
    els.loadYoutubeBtn.addEventListener("click", () => {
      if (isInstagramUrl(els.youtubeUrl.value)) {
        loadInstagram().catch(() => setStatus("Instagramの読み込みに失敗しました。"));
      } else {
        loadYoutube().catch(() => setStatus("YouTubeの読み込みに失敗しました。インターネット接続を確認してください。"));
      }
    });
    els.youtubeUrl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        els.loadYoutubeBtn.click();
      }
    });

    ["dragenter", "dragover"].forEach((name) => {
      els.stage.addEventListener(name, (event) => {
        event.preventDefault();
        els.stage.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach((name) => {
      els.stage.addEventListener(name, () => els.stage.classList.remove("dragover"));
    });

    els.stage.addEventListener("drop", (event) => {
      event.preventDefault();
      loadFile(event.dataTransfer.files[0]);
    });

    els.playBtn.addEventListener("click", () => {
      togglePlay().catch(() => setStatus("再生できませんでした。別の動画で試してください。"));
    });

    els.video.addEventListener("click", () => {
      togglePlay().catch(() => setStatus("再生できませんでした。"));
    });

    els.video.addEventListener("play", updatePlayButton);
    els.video.addEventListener("pause", updatePlayButton);
    els.video.addEventListener("loadedmetadata", () => {
      updateTimeline();
      // 縦長動画を検出してクラスを付与 & ズームリセット
      const portrait = els.video.videoHeight > els.video.videoWidth;
      els.stage.classList.toggle("portrait-video", portrait);
      resetZoom();
    });
    els.video.addEventListener("loadeddata", () => {
      els.empty.hidden = true;
      els.stage.classList.add("has-media");
    });
    els.video.addEventListener("error", () => {
      if (state.mode !== "local") return;
      const error = els.video.error;
      const detail = error && error.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED
        ? "このMP4の形式をブラウザが再生できない可能性があります。H.264/AACのMP4で試してください。"
        : "動画を読み込めませんでした。";
      setStatus(detail);
      els.empty.hidden = false;
      els.stage.classList.remove("has-media");
    });
    els.video.addEventListener("timeupdate", () => {
      if (state.loopEnabled && state.loopA != null && state.loopB != null && currentTime() >= state.loopB) {
        seekTo(state.loopA);
      }
      updateTimeline();
    });

    els.seek.addEventListener("input", () => {
      state.seeking = true;
      const duration = currentDuration();
      els.currentTime.textContent = formatTime((Number(els.seek.value) / 1000) * duration);
    });

    els.seek.addEventListener("change", () => {
      const duration = currentDuration();
      seekTo((Number(els.seek.value) / 1000) * duration);
      state.seeking = false;
      updateTimeline();
    });

    document.querySelectorAll("[data-jump]").forEach((button) => {
      button.addEventListener("click", () => jump(Number(button.dataset.jump)));
    });

    els.volume.addEventListener("input", updateVolume);
    els.speed.addEventListener("input", updateSpeed);
    els.speedDown.addEventListener("click", () => nudgeRange(els.speed, -0.05));
    els.speedUp.addEventListener("click", () => nudgeRange(els.speed, 0.05));
    els.speedReset.addEventListener("click", () => {
      els.speed.value = "1";
      updateSpeed();
    });

    els.pitch.addEventListener("input", updatePitch);
    els.pitchDown.addEventListener("click", () => nudgeRange(els.pitch, -1));
    els.pitchUp.addEventListener("click", () => nudgeRange(els.pitch, 1));
    els.pitchReset.addEventListener("click", () => {
      els.pitch.value = "0";
      updatePitch();
    });

    els.setA.addEventListener("click", () => {
      state.loopA = currentTime();
      if (state.loopB != null && state.loopB <= state.loopA) state.loopB = null;
      updateLoopUi();
    });

    els.setB.addEventListener("click", () => {
      state.loopB = currentTime();
      if (state.loopA == null || state.loopB <= state.loopA) {
        state.loopA = null;
        state.loopEnabled = false;
        setStatus("BはAより後ろに設定してください。");
      }
      updateLoopUi();
    });

    els.loopToggle.addEventListener("click", () => {
      state.loopEnabled = !state.loopEnabled;
      if (state.loopEnabled && currentTime() > state.loopB) {
        seekTo(state.loopA);
      }
      updateLoopUi();
    });

    els.clearLoop.addEventListener("click", () => {
      state.loopA = null;
      state.loopB = null;
      state.loopEnabled = false;
      updateLoopUi();
    });

    els.muteBtn.addEventListener("click", () => {
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        if (state.youtubePlayer.isMuted()) {
          state.youtubePlayer.unMute();
          els.muteBtn.textContent = "ミュート";
        } else {
          state.youtubePlayer.mute();
          els.muteBtn.textContent = "ミュート解除";
        }
        return;
      }
      els.video.muted = !els.video.muted;
      els.muteBtn.textContent = els.video.muted ? "ミュート解除" : "ミュート";
    });

    document.addEventListener("keydown", (event) => {
      if (event.target.matches("input")) return;
      if (event.code === "Space") {
        event.preventDefault();
        togglePlay().catch(() => {});
      }
      if (event.key === "ArrowLeft") jump(-3);
      if (event.key === "ArrowRight") jump(3);
    });

    setInterval(() => {
      if (state.mode === "youtube" && state.youtubePlayerReady) {
        if (state.loopEnabled && state.loopA != null && state.loopB != null && currentTime() >= state.loopB) {
          seekTo(state.loopA);
        }
        updateTimeline();
      }
    }, 250);

    updateVolume();
    updateSpeed();
    updatePitch();
    updateTimeline();
    updateLoopUi();

    // ── Zoom / pan ──────────────────────────────────────────────
    const mediaWrap = document.getElementById("mediaWrap");
    const zoomState = { scale: 1, panX: 0, panY: 0 };

    function applyZoom() {
      const { scale, panX, panY } = zoomState;
      mediaWrap.style.transform = scale > 1
        ? `translate(${panX}px,${panY}px) scale(${scale})`
        : "";
      els.stage.classList.toggle("zoomed", scale > 1);
    }

    function resetZoom() {
      zoomState.scale = 1; zoomState.panX = 0; zoomState.panY = 0;
      applyZoom();
    }

    function clampPan() {
      const rect = els.stage.getBoundingClientRect();
      const mx = rect.width  * (zoomState.scale - 1) / 2;
      const my = rect.height * (zoomState.scale - 1) / 2;
      zoomState.panX = Math.min(mx, Math.max(-mx, zoomState.panX));
      zoomState.panY = Math.min(my, Math.max(-my, zoomState.panY));
    }

    // Mouse wheel zoom (works over local video; YouTube iframe blocks it on desktop)
    els.stage.addEventListener("wheel", (e) => {
      e.preventDefault();
      const rect = els.stage.getBoundingClientRect();
      const mx = e.clientX - rect.left - rect.width  / 2;
      const my = e.clientY - rect.top  - rect.height / 2;
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      const newScale = Math.min(8, Math.max(1, zoomState.scale * factor));
      if (newScale !== zoomState.scale) {
        const ratio = newScale / zoomState.scale;
        zoomState.panX = mx - (mx - zoomState.panX) * ratio;
        zoomState.panY = my - (my - zoomState.panY) * ratio;
        zoomState.scale = newScale;
        if (zoomState.scale <= 1) { zoomState.scale = 1; zoomState.panX = 0; zoomState.panY = 0; }
        clampPan();
        applyZoom();
      }
    }, { passive: false });

    // Mouse drag (pan when zoomed)
    let mouseDragging = false, mouseDragX = 0, mouseDragY = 0, mouseDragPanX = 0, mouseDragPanY = 0, mouseMoved = false;

    els.stage.addEventListener("pointerdown", (e) => {
      if (e.pointerType === "touch") return;
      if (zoomState.scale <= 1) return;
      mouseDragging = true; mouseMoved = false;
      mouseDragX = e.clientX; mouseDragY = e.clientY;
      mouseDragPanX = zoomState.panX; mouseDragPanY = zoomState.panY;
      els.stage.setPointerCapture(e.pointerId);
      els.stage.classList.add("dragging");
    });

    els.stage.addEventListener("pointermove", (e) => {
      if (!mouseDragging || e.pointerType === "touch") return;
      const dx = e.clientX - mouseDragX, dy = e.clientY - mouseDragY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) mouseMoved = true;
      zoomState.panX = mouseDragPanX + dx;
      zoomState.panY = mouseDragPanY + dy;
      clampPan();
      applyZoom();
    });

    els.stage.addEventListener("pointerup", () => {
      mouseDragging = false;
      els.stage.classList.remove("dragging");
    });

    // Double-click to reset zoom
    els.stage.addEventListener("dblclick", () => { if (zoomState.scale > 1) resetZoom(); });

    // Touch: pinch-to-zoom + 2-finger drag (capture phase catches events over YouTube iframe)
    let pinchActive = false, touchDragActive = false, touchMoved = false;
    let pinchInitDist = 1, pinchInitScale = 1, pinchInitPanX = 0, pinchInitPanY = 0, pinchInitMidX = 0, pinchInitMidY = 0;
    let touchDragStartX = 0, touchDragStartY = 0, touchDragPanX = 0, touchDragPanY = 0;
    let lastTapTime = 0, lastTapX = 0, lastTapY = 0;

    function touchMidpoint(touches, rect) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2 - rect.left - rect.width  / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2 - rect.top  - rect.height / 2
      };
    }

    function touchDistance(touches) {
      return Math.hypot(touches[1].clientX - touches[0].clientX, touches[1].clientY - touches[0].clientY);
    }

    els.stage.addEventListener("touchstart", (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        pinchActive = true; touchDragActive = false; touchMoved = false;
        const rect = els.stage.getBoundingClientRect();
        pinchInitDist  = touchDistance(e.touches);
        pinchInitScale = zoomState.scale;
        pinchInitPanX  = zoomState.panX;
        pinchInitPanY  = zoomState.panY;
        const mid = touchMidpoint(e.touches, rect);
        pinchInitMidX = mid.x; pinchInitMidY = mid.y;
      } else if (e.touches.length === 1 && zoomState.scale > 1) {
        e.preventDefault();
        touchDragActive = true; pinchActive = false; touchMoved = false;
        touchDragStartX = e.touches[0].clientX; touchDragStartY = e.touches[0].clientY;
        touchDragPanX = zoomState.panX; touchDragPanY = zoomState.panY;
      }
    }, { passive: false, capture: true });

    els.stage.addEventListener("touchmove", (e) => {
      if (e.touches.length === 2 && pinchActive) {
        e.preventDefault();
        touchMoved = true;
        const rect = els.stage.getBoundingClientRect();
        const dist = touchDistance(e.touches);
        const newScale = Math.min(8, Math.max(1, pinchInitScale * dist / pinchInitDist));
        const mid = touchMidpoint(e.touches, rect);
        const ratio = newScale / pinchInitScale;
        zoomState.panX = mid.x - (pinchInitMidX - pinchInitPanX) * ratio;
        zoomState.panY = mid.y - (pinchInitMidY - pinchInitPanY) * ratio;
        zoomState.scale = newScale;
        if (zoomState.scale <= 1) { zoomState.scale = 1; zoomState.panX = 0; zoomState.panY = 0; }
        clampPan();
        applyZoom();
      } else if (e.touches.length === 1 && touchDragActive) {
        e.preventDefault();
        const dx = e.touches[0].clientX - touchDragStartX;
        const dy = e.touches[0].clientY - touchDragStartY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) touchMoved = true;
        zoomState.panX = touchDragPanX + dx;
        zoomState.panY = touchDragPanY + dy;
        clampPan();
        applyZoom();
      }
    }, { passive: false, capture: true });

    els.stage.addEventListener("touchend", (e) => {
      // Double-tap to reset zoom
      if (e.changedTouches.length === 1 && e.touches.length === 0 && !touchMoved) {
        const now = Date.now();
        const x = e.changedTouches[0].clientX, y = e.changedTouches[0].clientY;
        if (now - lastTapTime < 300 && Math.abs(x - lastTapX) < 40 && Math.abs(y - lastTapY) < 40) {
          if (zoomState.scale > 1) resetZoom();
        }
        lastTapTime = now; lastTapX = x; lastTapY = y;
      }
      if (e.touches.length === 0) {
        pinchActive = false; touchDragActive = false; touchMoved = false;
      }
    }, { capture: true });
  </script>
</body>
</html>
